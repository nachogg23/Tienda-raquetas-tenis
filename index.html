<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="styles.css">
<title>Rafa Nadal — Legend of the Court</title>


<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>


<link rel="stylesheet" href="styles.css"/>
</head>
<body>


<header class="siteHero">
    <div class="heroNoise"></div>
    <div class="heroContent">
    <p class="heroLabel">22 Grand Slams · King of Clay</p>
    <h1 class="heroTitle">
        RAFAEL<br/>
        <span>NADAL</span>
    </h1>
    <p class="heroSubtitle">
        A visual tribute to ten defining titles of the greatest clay-court champion in history.
    </p>
    <a href="#catalog" class="heroCta">Explore the Legacy</a>
    </div>
    <div class="heroScrollHint" aria-hidden="true">↓</div>
</header>


<section class="filterBar" id="catalog">
    <div class="container">
    <div class="filterGroup" id="filterGroup">
        <button class="filterBtn active" data-filter="all">All</button>
        <button class="filterBtn" data-filter="Grand Slam">Grand Slam</button>
        <button class="filterBtn" data-filter="Masters 1000">Masters 1000</button>
        <button class="filterBtn" data-filter="ATP 500">ATP 500</button>
        <button class="filterBtn" data-filter="Olympics">Olympics</button>
    </div>
    </div>
</section>


<main class="catalogSection">
    <div class="container">
    <div class="row g-4" id="tournamentSection">
    </div>
    </div>
</main>


<footer class="siteFooter">
    <p>Built with passion for the greatest champion. Data served via <strong>JSON Server</strong>.</p>
</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="main.js"></script>

</body>
</html>
